<section class="page">

    <div class="page-header">
        <div>
            <h1 class="page-title">Plagas</h1>
            <p class="page-subtitle">Registro y seguimiento de incidencias</p>
        </div>
        <div class="page-actions">
            <button class="btn primary" id="btnRegistrarPlaga">+ Registrar plaga</button>
        </div>
    </div>

    <!-- Filtros -->
    <div class="filter-bar">
        <div class="field">
            <span>Desde</span>
            <input type="date" id="fDesde" />
        </div>
        <div class="field">
            <span>Hasta</span>
            <input type="date" id="fHasta" />
        </div>
        <div class="field">
            <span>Plaga</span>
            <select id="fPlaga">
                <option value="">Todas</option>
            </select>
        </div>
        <div class="field">
            <span>Agrupar por</span>
            <select id="fAgrupacion">
                <option value="DIA" selected>Diario</option>
                <option value="MES">Mensual</option>
                <option value="ANIO">Anual</option>
            </select>
        </div>
        <div class="filter-bar-actions">
            <button class="btn" id="btnAplicar">Aplicar</button>
            <button class="btn" id="btnLimpiar">Limpiar</button>
            <button class="btn" id="btnRefrescar">Refrescar</button>
        </div>
    </div>

    <!-- Contenido principal -->
    <div class="plagas-grid">

        <!-- Tabla histórico -->
        <div class="content-card">
            <h3 class="content-card-title">Histórico de registros</h3>
            <div class="table-wrap">
                <table class="data-table" id="tblPlagas">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Plaga</th>
                            <th>Cantidad</th>
                            <th>Comentario</th>
                            <th>Registrado por</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <!-- Gráfica -->
        <div class="content-card">
            <h3 class="content-card-title" id="chartTitle">Incidencias (Diario)</h3>
            <div class="content-card-body">
                <div class="chart-wrap">
                    <canvas id="chartPlagas"></canvas>
                </div>
                <p class="hint">Se actualiza al aplicar filtros o registrar.</p>
            </div>
        </div>

    </div>

    <!-- Modal registrar plaga -->
    <div class="modal-backdrop hidden" id="modalPlaga">
        <div class="modal-box">
            <div class="modal-box-header">
                <h3>Registrar plaga</h3>
                <button class="icon-btn" id="btnCerrarModal">✕</button>
            </div>
            <form id="frmPlaga" class="modal-box-body">
                <div class="field">
                    <span>Fecha hallazgo *</span>
                    <input type="date" id="mFecha" required />
                </div>
                <div class="field">
                    <span>Plaga *</span>
                    <select id="mPlaga" required></select>
                </div>
                <div class="field">
                    <span>Cantidad</span>
                    <input type="number" id="mCantidad" min="1" value="1" />
                </div>
                <div class="field">
                    <span>Comentario</span>
                    <textarea id="mComentario" rows="3" placeholder="Opcional"></textarea>
                </div>
            </form>
            <div class="modal-box-footer">
                <button type="button" class="btn" id="btnCancelar">Cancelar</button>
                <button type="submit" form="frmPlaga" class="btn primary">Guardar</button>
            </div>
        </div>
    </div>

</section>
