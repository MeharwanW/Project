<div class="card">
    <div class="row">
        <h2>Inventario · Productos</h2>
        <span class="muted">API: /api/Producto</span>

        <button class="btn green" id="btnNuevoProducto">+ Nuevo producto</button>
        <button class="btn" id="btnRefrescarProductos">Refrescar</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Id</th>
                <th>Código</th>
                <th>Nombre</th>
                <th>Variedad</th>
                <th>Unidad</th>
                <th>Precio</th>
                <th>Activo</th>
                <th>Stock mín.</th>
                <th class="col-acciones">Acciones</th>
            </tr>
        </thead>
        <tbody id="productosBody">
            <tr><td colspan="9" class="muted">Cargando…</td></tr>
        </tbody>
    </table>
</div>

<!-- Modal -->
<div class="modal modal--overlay" id="modalProducto" hidden>
    <div class="modalCard modalCard--dialog">
        <div class="row">
            <h3 class="modalTitle">Nuevo producto</h3>
        </div>

        <div class="grid2" style="margin-top:12px;">

            <label style="grid-column:1/-1;">
                Nombre producto
                <input id="pNombreProducto" placeholder="Ej: Lechuga Romana" />
            </label>
            <label>
                Unidad de medida
                <select id="pUnidadId"></select>
            </label>
            <label>
                Precio base
                <input id="pPrecioBase" type="number" step="0.01" placeholder="Ej: 1000.00" />
            </label>

            <label>
                Días caducidad
                <input id="pDiasCaducidad" type="number" placeholder="Ej: 10" />
            </label>

            <label>
                Stock mínimo
                <input id="pStockMinimo" type="number" placeholder="Ej: 15" />
            </label>

            <label>
                Requiere refrigeración
                <select id="pRequiereRefrigeracion">
                    <option value="false">No</option>
                    <option value="true">Sí</option>
                </select>
            </label>

            <label>
                Activo
                <select id="pActivo">
                    <option value="true">Sí</option>
                    <option value="false">No</option>
                </select>
            </label>

            <label style="grid-column:1/-1;">
                Descripción (opcional)
                <input id="pDescripcion" placeholder="Opcional" />
            </label>

            <label style="grid-column:1/-1;">
                ImagenUrl (opcional)
                <input id="pImagenUrl" placeholder="/assets/img/..." />
            </label>
        </div>

        <div class="row" style="margin-top:12px;">
            <button class="btn" id="btnCerrarProducto">Cerrar</button>
            <button class="btn green" id="btnGuardarProducto">Guardar</button>
            <span class="muted" id="pMsg"></span>
        </div>
    </div>
</div>
